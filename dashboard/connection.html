<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
            margin-right: 5px;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        .status.connected {
            background-color: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background-color: #f8d7da;
            color: #721c24;
        }
        .error {
            margin-top: 10px;
            padding: 10px;
            background-color: #fff3cd;
            color: #856404;
            border-radius: 4px;
            display: none;
        }
        .debug-info {
            margin-top: 15px;
            padding: 10px;
            background: #2b2b2b;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="form-group">
        <label for="ontime-ip">Ontime IP:</label>
        <input type="text" id="ontime-ip" value="localhost">
    </div>
    
    <div class="form-group">
        <label for="ontime-port">Ontime Port:</label>
        <input type="number" id="ontime-port" value="4001">
    </div>
    
    <button id="connect-btn">Connect</button>
    <button id="test-btn">Test Connection</button>
    
    <div id="status" class="status disconnected">
        Disconnected
    </div>
    
    <div id="error" class="error"></div>
    
    <div class="debug-info">
        <strong>Debug Info:</strong><br>
        <span id="debug-info">Waiting for connection...</span>
    </div>
    
    <script src="connection.js"></script>
</body>
</html>
