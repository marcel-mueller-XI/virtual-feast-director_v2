<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appearance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
        }
        input[type="color"] {
            height: 40px;
        }
    </style>
</head>
<body>
    <div class="form-group">
        <label for="bg-color">Background Color:</label>
        <input type="color" id="bg-color" value="#00000000">
    </div>
    
    <div class="form-group">
        <label for="text-color">Text Color:</label>
        <input type="color" id="text-color" value="#ffffff">
    </div>
    
    <div class="form-group">
        <label for="alignment">Text Alignment:</label>
        <select id="alignment">
            <option value="left">Left</option>
            <option value="right">Right</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="count-visible">Visible Events Count:</label>
        <input type="number" id="count-visible" min="1" max="10" value="4">
    </div>
    
    <p><small>TODO: Implement appearance settings</small></p>
</body>
</html>
