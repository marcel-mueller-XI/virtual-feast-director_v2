<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appearance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
        }
        input[type="color"] {
            height: 40px;
            padding: 2px;
            cursor: pointer;
        }
        input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
            cursor: pointer;
        }
        input[type="number"] {
            width: 100%;
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .slider-row input[type="range"] {
            flex: 1;
            padding: 0;
        }
        .slider-value {
            min-width: 36px;
            text-align: right;
            font-size: 13px;
            color: #555;
        }
        .color-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .color-row input[type="color"] {
            flex: 1;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            font-weight: normal;
            white-space: nowrap;
            cursor: pointer;
        }
        input[type="color"]:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0.05em;
            margin: 20px 0 8px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="section-title">Colors</div>

    <div class="form-group">
        <label for="text-color">Text Color:</label>
        <input type="color" id="text-color" value="#000000">
    </div>

    <div class="section-title">Layout</div>

    <div class="form-group">
        <label for="alignment">Text Alignment:</label>
        <select id="alignment">
            <option value="left">Left</option>
            <option value="right">Right</option>
        </select>
    </div>

    <div class="form-group">
        <label for="count-visible">Visible Events Count:</label>
        <input type="number" id="count-visible" min="1" max="10" value="4">
    </div>

    <div class="section-title">Fonts</div>

    <div class="form-group">
        <label for="font">Font Family:</label>
        <select id="font">
            <optgroup label="Sans-serif">
                <option value="Arial, sans-serif">Arial</option>
                <option value="Arial Black, sans-serif">Arial Black</option>
                <option value="Calibri, sans-serif">Calibri</option>
                <option value="Franklin Gothic Medium, sans-serif">Franklin Gothic Medium</option>
                <option value="Futura, Century Gothic, sans-serif">Futura / Century Gothic</option>
                <option value="Gill Sans, sans-serif">Gill Sans</option>
                <option value="Helvetica Neue, Helvetica, Arial, sans-serif">Helvetica Neue</option>
                <option value="Impact, sans-serif">Impact</option>
                <option value="Lucida Sans Unicode, sans-serif">Lucida Sans</option>
                <option value="Segoe UI, sans-serif">Segoe UI</option>
                <option value="Tahoma, sans-serif">Tahoma</option>
                <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
                <option value="Verdana, sans-serif">Verdana</option>
            </optgroup>
            <optgroup label="Serif">
                <option value="Book Antiqua, Palatino, serif">Book Antiqua</option>
                <option value="Garamond, serif">Garamond</option>
                <option value="Georgia, serif">Georgia</option>
                <option value="Palatino Linotype, Palatino, serif">Palatino Linotype</option>
                <option value="Times New Roman, serif">Times New Roman</option>
            </optgroup>
            <optgroup label="Monospace">
                <option value="Consolas, monospace">Consolas</option>
                <option value="Courier New, monospace">Courier New</option>
                <option value="Lucida Console, monospace">Lucida Console</option>
            </optgroup>
        </select>
    </div>

    <div class="section-title">Text Sizes</div>

    <div class="form-group">
        <label for="size-current">Current Event (px):</label>
        <input type="number" id="size-current" min="8" max="300" value="48">
    </div>

    <div class="form-group">
        <label for="size-upcoming">Upcoming Events (px):</label>
        <input type="number" id="size-upcoming" min="8" max="300" value="32">
    </div>

    <div class="section-title">Position</div>

    <div class="form-group">
        <label>Horizontal (X):</label>
        <div class="slider-row">
            <input type="range" id="position-x" min="0" max="100" value="0">
            <span class="slider-value" id="position-x-val">0%</span>
        </div>
    </div>

    <div class="form-group">
        <label>Vertical (Y):</label>
        <div class="slider-row">
            <input type="range" id="position-y" min="0" max="100" value="0">
            <span class="slider-value" id="position-y-val">0%</span>
        </div>
    </div>

    <script>
        const displaySettings = nodecg.Replicant('displaySettings');

        const textColorInput  = document.getElementById('text-color');
        const alignmentSelect = document.getElementById('alignment');
        const countVisibleInput = document.getElementById('count-visible');
        const fontSelect      = document.getElementById('font');
        const sizeCurrentInput  = document.getElementById('size-current');
        const sizeUpcomingInput = document.getElementById('size-upcoming');
        const posXInput = document.getElementById('position-x');
        const posYInput = document.getElementById('position-y');
        const posXVal   = document.getElementById('position-x-val');
        const posYVal   = document.getElementById('position-y-val');

        function applySettingsToUI(settings) {
            if (!settings) return;

            const text = settings.colors?.text ?? '#000000';
            if (/^#[0-9a-fA-F]{6}$/.test(text)) textColorInput.value = text;

            alignmentSelect.value   = settings.alignment ?? 'left';
            countVisibleInput.value = settings.countVisibleEvents ?? 4;
            fontSelect.value        = settings.font ?? 'Arial, sans-serif';
            sizeCurrentInput.value  = settings.textSize?.current  ?? 48;
            sizeUpcomingInput.value = settings.textSize?.upcoming ?? 32;

            const x = settings.position?.x ?? 0;
            const y = settings.position?.y ?? 0;
            posXInput.value = x; posXVal.textContent = x + '%';
            posYInput.value = y; posYVal.textContent = y + '%';
        }

        function saveSettings() {
            displaySettings.value = {
                colors:    { text: textColorInput.value },
                font:      fontSelect.value || 'Arial, sans-serif',
                textSize:  {
                    current:  parseInt(sizeCurrentInput.value,  10) || 48,
                    upcoming: parseInt(sizeUpcomingInput.value, 10) || 32
                },
                position:  { x: parseInt(posXInput.value, 10), y: parseInt(posYInput.value, 10) },
                alignment: alignmentSelect.value,
                countVisibleEvents: parseInt(countVisibleInput.value, 10) || 4
            };
        }

        // Sync UI when replicant changes
        displaySettings.on('change', (newVal) => { if (newVal) applySettingsToUI(newVal); });

        // Live slider labels
        posXInput.addEventListener('input', () => { posXVal.textContent = posXInput.value + '%'; saveSettings(); });
        posYInput.addEventListener('input', () => { posYVal.textContent = posYInput.value + '%'; saveSettings(); });

        // Save on any field change
        textColorInput.addEventListener('input', saveSettings);
        alignmentSelect.addEventListener('change', saveSettings);
        countVisibleInput.addEventListener('change', saveSettings);
        fontSelect.addEventListener('change', saveSettings);
        sizeCurrentInput.addEventListener('change', saveSettings);
        sizeUpcomingInput.addEventListener('change', saveSettings);
    </script>
</body>
</html>
