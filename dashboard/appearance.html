<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appearance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 0.625rem;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 0.9375rem;
        }
        label {
            display: block;
            margin-bottom: 0.3125rem;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 0.3125rem;
            box-sizing: border-box;
        }
        input[type="color"] {
            height: 2.5rem;
            padding: 0.125rem;
            cursor: pointer;
        }
        input[type="checkbox"] {
            width: auto;
            margin-right: 0.3125rem;
            cursor: pointer;
        }
        input[type="number"] {
            width: 100%;
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .slider-row input[type="range"] {
            flex: 1;
            padding: 0;
        }
        .slider-value {
            min-width: 2.25rem;
            text-align: right;
            font-size: 0.8125rem;
            color: #555;
        }
        .slider-number {
            width: 3.75rem !important;
            padding: 0.1875rem 0.3125rem;
            font-size: 0.8125rem;
            text-align: right;
            flex-shrink: 0;
        }
        .color-row {
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }
        .color-row input[type="color"] {
            flex: 1;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            font-weight: normal;
            white-space: nowrap;
            cursor: pointer;
        }
        input[type="color"]:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .section-title {
            font-size: 0.6875rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0.05em;
            margin: 1.25rem 0 0.5rem;
            border-bottom: 1px solid #ddd;
            padding-bottom: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="section-title">Colors</div>

    <div class="form-group">
        <label for="text-color">Text Color:</label>
        <input type="color" id="text-color" value="#000000">
    </div>

    <div class="section-title">Layout</div>

    <div class="form-group">
        <label for="alignment">Text Alignment:</label>
        <select id="alignment">
            <option value="left">Left</option>
            <option value="right">Right</option>
        </select>
    </div>

    <div class="form-group">
        <label for="count-visible">Visible Events Count:</label>
        <input type="number" id="count-visible" min="1" max="10" value="4">
    </div>

    <div class="section-title">Fonts</div>

    <div class="form-group">
        <label for="font">Font Family:</label>
        <select id="font">
            <optgroup label="Sans-serif">
                <option value="Arial, sans-serif">Arial</option>
                <option value="Arial Black, sans-serif">Arial Black</option>
                <option value="Calibri, sans-serif">Calibri</option>
                <option value="Franklin Gothic Medium, sans-serif">Franklin Gothic Medium</option>
                <option value="Futura, Century Gothic, sans-serif">Futura / Century Gothic</option>
                <option value="Gill Sans, sans-serif">Gill Sans</option>
                <option value="Helvetica Neue, Helvetica, Arial, sans-serif">Helvetica Neue</option>
                <option value="Impact, sans-serif">Impact</option>
                <option value="Lucida Sans Unicode, sans-serif">Lucida Sans</option>
                <option value="Segoe UI, sans-serif">Segoe UI</option>
                <option value="Tahoma, sans-serif">Tahoma</option>
                <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
                <option value="Verdana, sans-serif">Verdana</option>
            </optgroup>
            <optgroup label="Serif">
                <option value="Book Antiqua, Palatino, serif">Book Antiqua</option>
                <option value="Garamond, serif">Garamond</option>
                <option value="Georgia, serif">Georgia</option>
                <option value="Palatino Linotype, Palatino, serif">Palatino Linotype</option>
                <option value="Times New Roman, serif">Times New Roman</option>
            </optgroup>
            <optgroup label="Monospace">
                <option value="Consolas, monospace">Consolas</option>
                <option value="Courier New, monospace">Courier New</option>
                <option value="Lucida Console, monospace">Lucida Console</option>
            </optgroup>
        </select>
    </div>

    <div class="section-title">Text Sizes</div>

    <div class="form-group">
        <label for="size-current">Current Event (vw):</label>
        <input type="number" id="size-current" min="0.1" max="15" step="0.1" value="2.5">
    </div>

    <div class="form-group">
        <label class="checkbox-label" style="font-weight:bold">
            <input type="checkbox" id="current-bold" checked>
            Bold current event
        </label>
    </div>

    <div class="form-group">
        <label for="size-upcoming">Upcoming Events (vw):</label>
        <input type="number" id="size-upcoming" min="0.1" max="15" step="0.1" value="1.7">
    </div>

    <div class="form-group">
        <label for="max-text-width">Max Text Width (vw):</label>
        <input type="number" id="max-text-width" min="5" max="100" step="0.5" value="90">
    </div>

    <div class="section-title">Position</div>

    <div class="form-group">
        <label>Horizontal (X):</label>
        <div class="slider-row">
            <input type="range" id="position-x" min="0" max="100" step="0.1" value="0">
            <input type="text" inputmode="decimal" id="position-x-num" class="slider-number" value="0">
        </div>
    </div>

    <div class="form-group">
        <label>Vertical (Y):</label>
        <div class="slider-row">
            <input type="range" id="position-y" min="0" max="100" step="0.1" value="0">
            <input type="text" inputmode="decimal" id="position-y-num" class="slider-number" value="0">
        </div>
    </div>

    <script>
        const displaySettings = nodecg.Replicant('displaySettings');

        const textColorInput  = document.getElementById('text-color');
        const alignmentSelect = document.getElementById('alignment');
        const countVisibleInput = document.getElementById('count-visible');
        const fontSelect      = document.getElementById('font');
        const sizeCurrentInput  = document.getElementById('size-current');
        const currentBoldInput  = document.getElementById('current-bold');
        const sizeUpcomingInput = document.getElementById('size-upcoming');
        const maxTextWidthInput = document.getElementById('max-text-width');
        // Accepts both '50.2' and '50,2'
        function parseDecimal(str) {
            const v = parseFloat(String(str).replace(',', '.'));
            return isNaN(v) ? 0 : Math.min(100, Math.max(0, v));
        }

        const posXInput  = document.getElementById('position-x');
        const posYInput  = document.getElementById('position-y');
        const posXNum    = document.getElementById('position-x-num');
        const posYNum    = document.getElementById('position-y-num');

        function applySettingsToUI(settings) {
            if (!settings) return;

            const text = settings.colors?.text ?? '#000000';
            if (/^#[0-9a-fA-F]{6}$/.test(text)) textColorInput.value = text;

            alignmentSelect.value   = settings.alignment ?? 'left';
            countVisibleInput.value = settings.countVisibleEvents ?? 4;
            fontSelect.value        = settings.font ?? 'Arial, sans-serif';
            sizeCurrentInput.value  = settings.textSize?.current  ?? 2.5;
            currentBoldInput.checked = settings.currentBold ?? true;
            sizeUpcomingInput.value = settings.textSize?.upcoming ?? 1.7;
            maxTextWidthInput.value = settings.maxTextWidth ?? 90;

            const x = settings.position?.x ?? 0;
            const y = settings.position?.y ?? 0;
            // Don't overwrite a field the user is actively typing in
            if (document.activeElement !== posXNum) { posXInput.value = x; posXNum.value = x; }
            if (document.activeElement !== posYNum) { posYInput.value = y; posYNum.value = y; }
        }

        function saveSettings() {
            displaySettings.value = {
                colors:    { text: textColorInput.value },
                font:      fontSelect.value || 'Arial, sans-serif',
                textSize:  {
                    current:  parseFloat(sizeCurrentInput.value)  || 2.5,
                    upcoming: parseFloat(sizeUpcomingInput.value) || 1.7
                },
                maxTextWidth: parseFloat(maxTextWidthInput.value) || 90,
                currentBold: currentBoldInput.checked,
                position:  { x: parseDecimal(posXNum.value), y: parseDecimal(posYNum.value) },
                alignment: alignmentSelect.value,
                countVisibleEvents: parseInt(countVisibleInput.value, 10) || 4
            };
        }

        // Sync UI when replicant changes
        displaySettings.on('change', (newVal) => { if (newVal) applySettingsToUI(newVal); });

        // Sync slider → number input
        posXInput.addEventListener('input', () => { posXNum.value = posXInput.value; saveSettings(); });
        posYInput.addEventListener('input', () => { posYNum.value = posYInput.value; saveSettings(); });

        // Sync number input → slider (normalise comma on blur for clean display)
        posXNum.addEventListener('input', () => { posXInput.value = parseDecimal(posXNum.value); saveSettings(); });
        posXNum.addEventListener('blur',  () => { posXNum.value = parseDecimal(posXNum.value); });
        posYNum.addEventListener('input', () => { posYInput.value = parseDecimal(posYNum.value); saveSettings(); });
        posYNum.addEventListener('blur',  () => { posYNum.value = parseDecimal(posYNum.value); });

        // Save on any field change
        textColorInput.addEventListener('input', saveSettings);
        alignmentSelect.addEventListener('change', saveSettings);
        countVisibleInput.addEventListener('change', saveSettings);
        fontSelect.addEventListener('change', saveSettings);
        sizeCurrentInput.addEventListener('change', saveSettings);
        currentBoldInput.addEventListener('change', saveSettings);
        sizeUpcomingInput.addEventListener('change', saveSettings);
        maxTextWidthInput.addEventListener('change', saveSettings);
    </script>
</body>
</html>
