<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appearance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
        }
        input[type="color"] {
            height: 40px;
            padding: 2px;
            cursor: pointer;
        }
        input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
            cursor: pointer;
        }
        input[type="number"] {
            width: 100%;
        }
        .color-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .color-row input[type="color"] {
            flex: 1;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            font-weight: normal;
            white-space: nowrap;
            cursor: pointer;
        }
        input[type="color"]:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0.05em;
            margin: 20px 0 8px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="section-title">Colors</div>

    <div class="form-group">
        <label for="text-color">Text Color:</label>
        <input type="color" id="text-color" value="#000000">
    </div>

    <div class="section-title">Layout</div>

    <div class="form-group">
        <label for="alignment">Text Alignment:</label>
        <select id="alignment">
            <option value="left">Left</option>
            <option value="right">Right</option>
        </select>
    </div>

    <div class="form-group">
        <label for="count-visible">Visible Events Count:</label>
        <input type="number" id="count-visible" min="1" max="10" value="4">
    </div>

    <div class="section-title">Fonts</div>

    <div class="form-group">
        <label for="title-font">Current Event Font:</label>
        <input type="text" id="title-font" placeholder="e.g. Arial, sans-serif">
    </div>

    <div class="form-group">
        <label for="upcoming-font">Upcoming Events Font:</label>
        <input type="text" id="upcoming-font" placeholder="e.g. Arial, sans-serif">
    </div>

    <script>
        const displaySettings = nodecg.Replicant('displaySettings');

        const textColorInput = document.getElementById('text-color');
        const alignmentSelect = document.getElementById('alignment');
        const countVisibleInput = document.getElementById('count-visible');
        const titleFontInput = document.getElementById('title-font');
        const upcomingFontInput = document.getElementById('upcoming-font');

        function applySettingsToUI(settings) {
            if (!settings) return;

            const text = settings.colors?.text ?? '#000000';
            if (/^#[0-9a-fA-F]{6}$/.test(text)) {
                textColorInput.value = text;
            }

            alignmentSelect.value = settings.alignment ?? 'left';
            countVisibleInput.value = settings.countVisibleEvents ?? 4;
            titleFontInput.value = settings.fonts?.title ?? 'Arial, sans-serif';
            upcomingFontInput.value = settings.fonts?.upcoming ?? 'Arial, sans-serif';
        }

        function saveSettings() {
            displaySettings.value = {
                colors: {
                    text: textColorInput.value
                },
                fonts: {
                    title: titleFontInput.value || 'Arial, sans-serif',
                    upcoming: upcomingFontInput.value || 'Arial, sans-serif'
                },
                alignment: alignmentSelect.value,
                countVisibleEvents: parseInt(countVisibleInput.value, 10) || 4
            };
        }

        // Sync UI when replicant changes (e.g. on load or from another panel)
        displaySettings.on('change', (newVal) => {
            if (newVal) applySettingsToUI(newVal);
        });

        // Save on any field change
        textColorInput.addEventListener('input', saveSettings);
        alignmentSelect.addEventListener('change', saveSettings);
        countVisibleInput.addEventListener('change', saveSettings);
        titleFontInput.addEventListener('change', saveSettings);
        upcomingFontInput.addEventListener('change', saveSettings);
    </script>
</body>
</html>
