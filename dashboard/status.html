<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        .status-item {
            margin-bottom: 10px;
            padding: 8px;
            background: #2b2b2b;
            border-radius: 4px;
        }
        .status-item strong {
            display: inline-block;
            width: 150px;
        }
    </style>
</head>
<body>
    <div class="status-item">
        <strong>Connection:</strong>
        <span id="connection-status">Disconnected</span>
    </div>
    
    <div class="status-item">
        <strong>Current Event:</strong>
        <span id="current-event">-</span>
    </div>
    
    <div class="status-item">
        <strong>Upcoming Events:</strong>
        <span id="upcoming-count">0</span>
    </div>
    
    <div class="status-item">
        <strong>Last Update:</strong>
        <span id="last-update">Never</span>
    </div>
    
    <p><small>TODO: Implement status monitoring</small></p>
</body>
</html>
